<main class="content">

<h1>Usuários</h1>

<div class="form-card">

<form id="usuarioForm">

<input
type="text"
id="nome"
placeholder="Nome Completo"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<select id="perfil">

<option>
Funcionário
</option>

<option>
Supervisor
</option>

<option>
Desenvolvedor
</option>

</select>

<button type="submit">
Cadastrar
</button>

</form>

</div>

<div class="table-card">

<table>

<thead>

<tr>

<th>Nome</th>
<th>Email</th>
<th>Perfil</th>

</tr>

</thead>

<tbody id="tabelaUsuarios">

</tbody>

</table>
