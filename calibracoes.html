<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calibracoes | Sistema de Metrologia</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" data-sidebar></aside>

    <main class="content">
      <header class="topbar">
        <div>
          <span class="eyebrow">Validade metrologica</span>
          <h1>Calibracoes</h1>
          <p>Registre certificados, empresas calibradoras, resultados e validade dos instrumentos.</p>
        </div>
        <div class="userbar" data-userbar></div>
      </header>

      <section class="section-grid">
        <div class="form-card">
          <h2>Registrar calibracao</h2>
          <form id="calibracaoForm">
            <div class="field">
              <label for="instrumento">Instrumento</label>
              <input id="instrumento" list="instrumentosList" required>
              <datalist id="instrumentosList"></datalist>
            </div>
            <div class="field">
              <label for="empresa">Empresa calibradora</label>
              <input id="empresa" required>
            </div>
            <div class="field">
              <label for="certificado">Numero do certificado</label>
              <input id="certificado">
            </div>
            <div class="field">
              <label for="dataCalibracao">Data da calibracao</label>
              <input type="date" id="dataCalibracao" required>
            </div>
            <div class="field">
              <label for="validade">Validade</label>
              <input type="date" id="validade" required>
            </div>
            <div class="field">
              <label for="resultado">Resultado</label>
              <select id="resultado">
                <option>Aprovado</option>
                <option>Aprovado com restricao</option>
                <option>Reprovado</option>
              </select>
            </div>
            <div class="field">
              <label for="incerteza">Incerteza</label>
              <input id="incerteza" placeholder="Ex.: 0,005 mm">
            </div>
            <div class="field">
              <label for="arquivo">Arquivo / link do certificado</label>
              <input id="arquivo" placeholder="URL ou identificacao interna">
            </div>
            <div class="field full-row">
              <label for="observacoes">Observacoes</label>
              <textarea id="observacoes"></textarea>
            </div>
            <button class="primary-button" type="submit">Salvar calibracao</button>
          </form>
        </div>

        <div class="table-card">
          <h2>Historico de calibracoes</h2>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>Instrumento</th>
                  <th>Empresa</th>
                  <th>Certificado</th>
                  <th>Validade</th>
                  <th>Resultado</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="tabelaCalibracoes"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="calibracoes.js"></script>
</body>
</html>
