<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instrumentos | Sistema de Metrologia</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" data-sidebar></aside>

    <main class="content">
      <header class="topbar">
        <div>
          <span class="eyebrow">Cadastro e rastreabilidade</span>
          <h1>Instrumentos</h1>
          <p>Controle de identificacao, localizacao, faixa de medicao, criticidade e validade metrologica.</p>
        </div>
        <div class="userbar" data-userbar></div>
      </header>

      <section class="section-grid">
        <div class="form-card">
          <h2>Cadastrar instrumento</h2>
          <form id="instrumentoForm">
            <div class="form-grid">
              <div class="field">
                <label for="codigo">Codigo</label>
                <input id="codigo" required>
              </div>
              <div class="field">
                <label for="nome">Nome</label>
                <input id="nome" required>
              </div>
              <div class="field">
                <label for="tipo">Tipo</label>
                <input id="tipo" placeholder="Paquimetro, micrometro..." required>
              </div>
              <div class="field">
                <label for="fabricante">Fabricante</label>
                <input id="fabricante">
              </div>
              <div class="field">
                <label for="modelo">Modelo</label>
                <input id="modelo">
              </div>
              <div class="field">
                <label for="serie">Numero de serie</label>
                <input id="serie">
              </div>
              <div class="field">
                <label for="faixa">Faixa de medicao</label>
                <input id="faixa" placeholder="0-150 mm">
              </div>
              <div class="field">
                <label for="resolucao">Resolucao</label>
                <input id="resolucao" placeholder="0,01 mm">
              </div>
              <div class="field">
                <label for="localizacao">Localizacao</label>
                <input id="localizacao" placeholder="Laboratorio, usinagem...">
              </div>
              <div class="field">
                <label for="responsavel">Responsavel</label>
                <input id="responsavel">
              </div>
              <div class="field">
                <label for="criticidade">Criticidade</label>
                <select id="criticidade">
                  <option>Baixa</option>
                  <option selected>Media</option>
                  <option>Alta</option>
                </select>
              </div>
              <div class="field">
                <label for="status">Status</label>
                <select id="status">
                  <option>Ativo</option>
                  <option>Em calibracao</option>
                  <option>Bloqueado</option>
                  <option>Inativo</option>
                </select>
              </div>
              <div class="field">
                <label for="ultimaCalibracao">Ultima calibracao</label>
                <input type="date" id="ultimaCalibracao">
              </div>
              <div class="field">
                <label for="proximaCalibracao">Proxima calibracao</label>
                <input type="date" id="proximaCalibracao">
              </div>
            </div>
            <button class="primary-button" type="submit">Salvar instrumento</button>
          </form>
        </div>

        <div class="table-card">
          <h2>Instrumentos cadastrados</h2>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>Codigo</th>
                  <th>Nome</th>
                  <th>Tipo</th>
                  <th>Local</th>
                  <th>Proxima calibracao</th>
                  <th>Status</th>
                  <th class="actions-column" data-actions-header>Acoes</th>
                </tr>
              </thead>
              <tbody id="tabelaInstrumentos"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="instrumentos.js"></script>
</body>
</html>
