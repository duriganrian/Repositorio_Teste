<div class="layout">

<main class="content">

<div class="page-header">

<h1>Instrumentos</h1>

<button id="btnNovo">
Novo Instrumento
</button>

</div>

<div class="form-card">

<h2>Cadastrar Instrumento</h2>

<form id="instrumentoForm">

<input
type="text"
id="codigo"
placeholder="Código"
required>

<input
type="text"
id="nome"
placeholder="Nome"
required>

<input
type="text"
id="tipo"
placeholder="Tipo"
required>

<input
type="text"
id="fabricante"
placeholder="Fabricante">

<input
type="text"
id="modelo"
placeholder="Modelo">

<input
type="text"
id="serie"
placeholder="Número de Série">

<input
type="date"
id="ultimaCalibracao">

<input
type="date"
id="proximaCalibracao">

<button type="submit">
Salvar Instrumento
</button>

</form>

</div>

<div class="table-card">

<h2>Instrumentos Cadastrados</h2>

<table>

<thead>

<tr>

<th>Código</th>
<th>Nome</th>
<th>Tipo</th>
<th>Série</th>
<th>Próx. Calibração</th>

</tr>

</thead>

<tbody id="tabelaInstrumentos">

</tbody>

</table>

</div>

</main>

</div>

<script src="../js/instrumentos.js"></script>
