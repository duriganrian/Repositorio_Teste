<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Controle Dimensional</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/controle-dimensional.css">

</head>

<body>

<div class="layout">

<aside class="sidebar">

<h2>Fundição Moreno</h2>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="instrumentos.html">Instrumentos</a></li>
<li><a href="calibracoes.html">Calibrações</a></li>

<li>
<a class="active"
href="controle-dimensional.html">
Controle Dimensional
</a>
</li>

</ul>

</aside>

<main class="content">

<h1>Controle Dimensional</h1>

<div class="form-card">

<form id="dimensionalForm">

<input
type="text"
id="peca"
placeholder="Código da Peça"
required>

<input
type="text"
id="caracteristica"
placeholder="Característica"
required>

<input
type="number"
step="0.001"
id="nominal"
placeholder="Cota Nominal"
required>

<input
type="number"
step="0.001"
id="minimo"
placeholder="Tolerância Mínima"
required>

<input
type="number"
step="0.001"
id="maximo"
placeholder="Tolerância Máxima"
required>

<input
type="number"
step="0.001"
id="medicao"
placeholder="Medição"
required>

<button type="submit">
Registrar Medição
</button>

</form>

</div>

<div class="table-card">

<table>

<thead>

<tr>

<th>Peça</th>
<th>Característica</th>
<th>Nominal</th>
<th>Medição</th>
<th>Status</th>

</tr>

</thead>

<tbody id="tabelaDimensional">

</tbody>

</table>

</div>

</main>

</div>

<script src="../js/controle-dimensional.js"></script>

</body>
</html>
