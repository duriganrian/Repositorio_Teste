<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Dimensional | Sistema de Metrologia</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" data-sidebar></aside>

    <main class="content">
      <header class="topbar">
        <div>
          <span class="eyebrow">Inspecao dimensional</span>
          <h1>Controle Dimensional</h1>
          <p>Registre medicoes por peca, caracteristica, tolerancia, instrumento utilizado e resultado.</p>
        </div>
        <div class="userbar" data-userbar></div>
      </header>

      <section class="section-grid">
        <div class="form-card">
          <h2>Registrar medicao</h2>
          <form id="dimensionalForm">
            <div class="form-grid">
              <div class="field">
                <label for="ordem">Ordem / OP</label>
                <input id="ordem">
              </div>
              <div class="field">
                <label for="peca">Codigo da peca</label>
                <input id="peca" required>
              </div>
              <div class="field">
                <label for="lote">Lote</label>
                <input id="lote">
              </div>
              <div class="field">
                <label for="caracteristica">Caracteristica</label>
                <input id="caracteristica" required>
              </div>
              <div class="field">
                <label for="instrumento">Instrumento</label>
                <input id="instrumento" list="instrumentosList">
                <datalist id="instrumentosList"></datalist>
              </div>
              <div class="field">
                <label for="nominal">Cota nominal</label>
                <input type="number" step="0.001" id="nominal" required>
              </div>
              <div class="field">
                <label for="minimo">Limite minimo</label>
                <input type="number" step="0.001" id="minimo" required>
              </div>
              <div class="field">
                <label for="maximo">Limite maximo</label>
                <input type="number" step="0.001" id="maximo" required>
              </div>
              <div class="field">
                <label for="medicao">Medicao encontrada</label>
                <input type="number" step="0.001" id="medicao" required>
              </div>
              <div class="field full-row">
                <label for="observacoes">Observacoes</label>
                <textarea id="observacoes"></textarea>
              </div>
            </div>
            <button class="primary-button" type="submit">Registrar medicao</button>
          </form>
        </div>

        <div class="table-card">
          <h2>Medicoes registradas</h2>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>Peca</th>
                  <th>Caracteristica</th>
                  <th>Nominal</th>
                  <th>Medicao</th>
                  <th>Desvio</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="tabelaDimensional"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="controle-dimensional.js"></script>
</body>
</html>
