<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Sistema de Metrologia</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" data-sidebar></aside>

    <main class="content">
      <header class="topbar">
        <div>
          <span class="eyebrow">Visao geral</span>
          <h1>Dashboard</h1>
          <p>Indicadores principais da operacao de metrologia e rastreabilidade dos registros do sistema.</p>
        </div>
        <div class="userbar" data-userbar></div>
      </header>

      <section class="cards" id="dashboardCards"></section>

      <section class="wide-grid">
        <div class="table-card">
          <h2>Calibracoes proximas ou vencidas</h2>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>Instrumento</th>
                  <th>Validade</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="calibrationAlerts"></tbody>
            </table>
          </div>
        </div>

        <div class="table-card">
          <h2>Ultimas atividades</h2>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Acao</th>
                  <th>Usuario</th>
                </tr>
              </thead>
              <tbody id="recentActivity"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
