<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Ferramentaria</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="logo-area">
        <img src="logo.png" alt="Moreno Fundição">
    </div>

    <div class="login-card">

        <div class="card-header">
            <span class="tag">FERRAMENTARIA</span>

            <h1>Entrar no sistema</h1>

            <p>
                Selecione o modo de acesso e informe suas credenciais.
            </p>
        </div>

        <div class="card-body">

            <div class="access-switch">

                <button class="switch-btn active">
                    <i class="fa-solid fa-desktop"></i>
                    Admin
                </button>

                <button class="switch-btn">
                    <i class="fa-solid fa-tablet-screen-button"></i>
                    Tablet
                </button>

            </div>

            <form id="loginForm">

                <div class="field">
                    <label>Email</label>

                    <div class="input-group">
                        <i class="fa-regular fa-envelope"></i>

                        <input
                            type="email"
                            placeholder="seu@email.com"
                            autocomplete="username"
                        >
                    </div>
                </div>

                <div class="field">
                    <label>Senha</label>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                        >

                        <button type="button" class="eye-btn">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <label class="remember">
                    <input type="checkbox">
                    Lembrar por 24h
                </label>

                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    Entrar
                </button>

            </form>

        </div>

    </div>

    <p class="footer-text">
        Sistema interno de controle de ferramentaria
    </p>

</div>

</body>
</html>
