services:
  - type: web
    name: fundicao-moreno-web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fundicao-moreno-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DEV_EMAIL
        value: duriganrian7@gmail.com
      - key: DEV_PASSWORD
        sync: false
      - key: MANAGER_PASSWORD
        sync: false
      - key: EMPLOYEE_PASSWORD
        sync: false

databases:
  - name: fundicao-moreno-db
    databaseName: fundicao_moreno
    user: fundicao_moreno_user
    plan: free
